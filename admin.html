<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Restored Fountain Tabernacle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="admin-body">
  <main class="admin-login">
    <div class="admin-login__card">
      <img src="assets/logo.png" alt="Restored Fountain Tabernacle" class="admin-login__logo">
      <h1 class="admin-login__title">Admin Login</h1>
      <p class="admin-login__subtitle">Sign in with your admin account</p>
      <form class="admin-login__form" id="admin-login-form">
        <label class="admin-login__label">Email</label>
        <input type="email" name="email" class="admin-login__input" placeholder="Admin email" required autocomplete="email">
        <label class="admin-login__label">Password</label>
        <input type="password" name="password" class="admin-login__input" placeholder="Admin password" required autocomplete="current-password">
        <button type="submit" class="btn btn--primary admin-login__submit" id="admin-login-btn">Sign In</button>
      </form>
      <p class="admin-login__links">
        <a href="login.html">Member login</a>
        <span class="admin-login__sep">•</span>
        <a href="register.html">Create account</a>
      </p>
      <a href="index.html" class="admin-login__back">← Back to Home</a>
    </div>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      const form = document.getElementById('admin-login-form');
      const btn = document.getElementById('admin-login-btn');
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const email = form.email.value.trim();
        const password = form.password.value;
        if (!email || !password) return;
        btn.disabled = true;
        btn.textContent = 'Signing in…';
        try {
          const { role } = await Auth.signIn(email, password);
          if (role === 'admin') {
            window.location.replace('admin-dashboard.html');
          } else {
            btn.disabled = false;
            btn.textContent = 'Sign In';
            if (typeof Swal !== 'undefined') {
              Swal.fire({ title: 'Access Denied', text: 'This account does not have admin privileges.', icon: 'error', confirmButtonColor: '#c9a227' });
            } else {
              alert('This account does not have admin privileges.');
            }
          }
        } catch (err) {
          btn.disabled = false;
          btn.textContent = 'Sign In';
          const msg = err.code === 'auth/invalid-credential' ? 'Invalid email or password.' :
            err.code === 'auth/user-not-found' ? 'No account found.' : err.message || 'Sign in failed.';
          if (typeof Swal !== 'undefined') {
            Swal.fire({ title: 'Sign In Failed', text: msg, icon: 'error', confirmButtonColor: '#c9a227' });
          } else {
            alert(msg);
          }
        }
      });
    })();
  </script>
</body>
</html>
