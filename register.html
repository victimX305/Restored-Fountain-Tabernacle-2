<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account | Restored Fountain Tabernacle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="admin-body">
  <main class="admin-login">
    <div class="admin-login__card">
      <img src="assets/logo.png" alt="Restored Fountain Tabernacle" class="admin-login__logo">
      <h1 class="admin-login__title">Create Account</h1>
      <p class="admin-login__subtitle">Join the Restored Fountain family</p>
      <form class="admin-login__form" id="register-form">
        <label class="admin-login__label">Full Name</label>
        <input type="text" name="displayName" class="admin-login__input" placeholder="Your name" required autocomplete="name">
        <label class="admin-login__label">Email</label>
        <input type="email" name="email" class="admin-login__input" placeholder="Enter your email" required autocomplete="email">
        <label class="admin-login__label">Password</label>
        <input type="password" name="password" class="admin-login__input" placeholder="At least 6 characters" required autocomplete="new-password" minlength="6">
        <label class="admin-login__label">Confirm Password</label>
        <input type="password" name="confirmPassword" class="admin-login__input" placeholder="Confirm password" required autocomplete="new-password" minlength="6">
        <button type="submit" class="btn btn--primary admin-login__submit" id="register-btn">Create Account</button>
      </form>
      <p class="admin-login__links">
        <a href="login.html">Already have an account? Sign in</a>
      </p>
      <a href="index.html" class="admin-login__back">← Back to Home</a>
    </div>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      const form = document.getElementById('register-form');
      const btn = document.getElementById('register-btn');
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const displayName = form.displayName.value.trim();
        const email = form.email.value.trim();
        const password = form.password.value;
        const confirmPassword = form.confirmPassword.value;
        if (password !== confirmPassword) {
          if (typeof Swal !== 'undefined') {
            Swal.fire({ title: 'Passwords Don\'t Match', text: 'Please ensure both passwords match.', icon: 'error', confirmButtonColor: '#c9a227' });
          } else {
            alert('Passwords do not match.');
          }
          return;
        }
        if (password.length < 6) {
          if (typeof Swal !== 'undefined') {
            Swal.fire({ title: 'Password Too Short', text: 'Password must be at least 6 characters.', icon: 'error', confirmButtonColor: '#c9a227' });
          } else {
            alert('Password must be at least 6 characters.');
          }
          return;
        }
        btn.disabled = true;
        btn.textContent = 'Creating account…';
        try {
          await Auth.registerUser(email, password, displayName);
          if (typeof Swal !== 'undefined') {
            Swal.fire({ title: 'Account Created!', text: 'Welcome to Restored Fountain Tabernacle.', icon: 'success', confirmButtonColor: '#c9a227' }).then(function () {
              window.location.href = 'index.html';
            });
          } else {
            alert('Account created! Redirecting…');
            window.location.href = 'index.html';
          }
        } catch (err) {
          btn.disabled = false;
          btn.textContent = 'Create Account';
          const msg = err.code === 'auth/email-already-in-use' ? 'An account with this email already exists.' :
            err.code === 'auth/invalid-email' ? 'Invalid email address.' :
            err.code === 'auth/weak-password' ? 'Password is too weak. Use at least 6 characters.' :
            err.message || 'Registration failed. Please try again.';
          if (typeof Swal !== 'undefined') {
            Swal.fire({ title: 'Registration Failed', text: msg, icon: 'error', confirmButtonColor: '#c9a227' });
          } else {
            alert(msg);
          }
        }
      });
    })();
  </script>
</body>
</html>
